packages:
  - packages/*
  - "!**/test/**"
saveExact: true
unsafePerm: true
enablePrePostScripts: true
autoInstallPeers: true
ignoreWorkspaceRootCheck: true
allowBuilds:
  "@kmamal/sdl": true
  canvas: true
  esbuild: true
  sharp: true
  typeslayer: true
# Pin tsdown's rolldown toolchain to versions already past pnpm 11's
# minimumReleaseAge (1 day) supply-chain window. rolldown 1.1.3 and
# @napi-rs/wasm-runtime 1.1.6 are <1 day old and correctly rejected by the
# policy; drop these once the newer releases have aged out.
overrides:
  "rolldown": "1.1.2"
  "@napi-rs/wasm-runtime": "1.1.5"
